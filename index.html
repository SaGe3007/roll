<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны — 36 цифр (фиксированные веса)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .wheel-container {
            max-width: 800px;
            width: 100%;
            background: rgba(30, 20, 15, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 64px;
            padding: 25px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 120, 0.4);
            text-align: center;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #2c1e12;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 12px #f7d44a, 0 0 0 18px #b87c2e;
            cursor: pointer;
        }

        .pointer {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-top: 65px solid #ffcc33;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
            z-index: 10;
        }
        .pointer::after {
            content: "⚡";
            position: absolute;
            top: -62px;
            left: -14px;
            font-size: 28px;
            color: #d48d00;
            text-shadow: 0 0 3px gold;
        }

        .spin-btn {
            margin-top: 35px;
            background: radial-gradient(circle at 30% 10%, #ffd966, #e6a017);
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 14px 35px;
            border-radius: 80px;
            color: #2d1b0c;
            box-shadow: 0 8px 0 #8b5a2b;
            cursor: pointer;
            transition: 0.08s linear;
            font-family: inherit;
            letter-spacing: 2px;
            width: 80%;
            max-width: 280px;
        }
        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8b5a2b;
        }
        .spin-btn:disabled {
            opacity: 0.6;
            transform: translateY(0);
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 20px;
            background: #1f2a1bdb;
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffefb9;
            text-align: center;
            width: 100%;
            border: 1px solid #ffcd7e;
        }

        .info {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #ffdd99;
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="wheel-container">
    <div class="canvas-wrapper">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
        <div class="pointer"></div>
    </div>
    <button class="spin-btn" id="spinButton">🎡 КРУТИТЬ 🎲</button>
    <div class="result-area" id="resultMessage">
        ✨ Нажми «Крутить» ✨
    </div>
    <div class="info">
        🎲 36 цифр с фиксированными весами (из вашего JSON)
    </div>
</div>

<script>
    (function() {
        // ==================== ВАШИ ВЕСА (36 цифр) ====================
        const WEIGHTS = [
            50,    // 1
            200,   // 2
            1000,  // 3
            400,   // 4
            60,    // 5
            1000,  // 6
            480,   // 7
            500,   // 8
            180,   // 9
            400,   // 10
            320,   // 11
            1,     // 12
            650,   // 13
            420,   // 14
            170,   // 15
            20,    // 16
            300,   // 17
            50,    // 18
            700,   // 19
            89,    // 20
            310,   // 21
            600,   // 22
            100,   // 23
            100,   // 24
            60,    // 25
            300,   // 26
            40,    // 27
            70,    // 28
            1,     // 29
            49,    // 30
            550,   // 31
            200,   // 32
            80,    // 33
            300,   // 34
            20,    // 35
            300    // 36
        ];
        // =============================================================

        const SECTORS_COUNT = WEIGHTS.length;
        // Вычисляем общую сумму весов
        const TOTAL_WEIGHT = WEIGHTS.reduce((a, b) => a + b, 0);
        // Для каждого сектора храним угол в радианах (долю от 2π)
        const ANGLES = [];
        let accum = 0;
        for (let i = 0; i < SECTORS_COUNT; i++) {
            const angle = (WEIGHTS[i] / TOTAL_WEIGHT) * 2 * Math.PI;
            ANGLES.push({ start: accum, end: accum + angle });
            accum += angle;
        }

        // Цветовая палитра (повторяется если не хватит)
        const colorPalette = [
            '#F94144', '#F9844A', '#F9C74F', '#90BE6D', '#43AA8B', '#4D908E', '#577590', '#9B5DE5',
            '#F15BB5', '#FEE440', '#00BBF9', '#00F5D4', '#D90368', '#FFB703', '#FB8B67', '#6C9EBF',
            '#F94144', '#F9844A', '#F9C74F', '#90BE6D', '#43AA8B', '#4D908E', '#577590', '#9B5DE5',
            '#F15BB5', '#FEE440', '#00BBF9', '#00F5D4', '#D90368', '#FFB703', '#FB8B67', '#6C9EBF'
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinButton');
        const resultDiv = document.getElementById('resultMessage');

        let spinning = false;
        let animFrame = null;
        let currentRotation = 0;        // текущий поворот колеса в радианах
        let startTime = 0;
        const duration = 1600;           // мс
        let startRotation = 0;
        let targetRotation = 0;

        const POINTER_ANGLE = -Math.PI / 2;   // направление указателя (вверх)

        // Функция отрисовки колеса с текущим поворотом
        function drawWheel() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const radius = w * 0.44;

            ctx.clearRect(0, 0, w, h);

            for (let i = 0; i < SECTORS_COUNT; i++) {
                const startRaw = ANGLES[i].start;
                const endRaw = ANGLES[i].end;
                const start = startRaw + currentRotation;
                const end = endRaw + currentRotation;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, start, end);
                ctx.closePath();
                ctx.fillStyle = colorPalette[i % colorPalette.length];
                ctx.fill();
                ctx.strokeStyle = '#2c1a0b';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Номер цифры (i+1)
                const number = (i + 1).toString();
                const midAngle = (startRaw + (endRaw - startRaw) / 2) + currentRotation;
                const textRadius = radius * 0.72;
                const x = cx + Math.cos(midAngle) * textRadius;
                const y = cy + Math.sin(midAngle) * textRadius;

                ctx.font = `bold ${Math.max(18, Math.min(34, radius * 0.16))}px "Segoe UI", "Poppins"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 2;
                ctx.shadowColor = 'black';
                ctx.fillStyle = '#fff5e6';
                ctx.fillText(number, x, y);
                ctx.fillStyle = '#2c1e10';
                ctx.shadowBlur = 0;
                ctx.fillText(number, x, y);
            }

            // Центральная круглая вставка
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.13, 0, Math.PI * 2);
            ctx.fillStyle = "#f7cf7c";
            ctx.shadowBlur = 5;
            ctx.fill();
            ctx.fillStyle = "#bf8f3a";
            ctx.font = "bold 30px sans-serif";
            ctx.fillText("🎲", cx, cy);
        }

        // Определить, какая цифра выпала при текущем повороте
        function getCurrentNumber() {
            // Направление указателя в глобальной системе координат
            let pointerDir = POINTER_ANGLE;
            pointerDir = ((pointerDir % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

            // Проходим по секторам с учётом поворота
            for (let i = 0; i < SECTORS_COUNT; i++) {
                let start = ANGLES[i].start + currentRotation;
                let end = ANGLES[i].end + currentRotation;
                start = ((start % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                end = ((end % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

                let contains = false;
                if (start < end) {
                    if (pointerDir >= start && pointerDir < end) contains = true;
                } else {
                    if (pointerDir >= start || pointerDir < end) contains = true;
                }
                if (contains) return i + 1;  // номер цифры
            }
            // fallback (не должно случиться)
            return 1;
        }

        function updateResultText() {
            const number = getCurrentNumber();
            const weight = WEIGHTS[number - 1];
            const prob = ((weight / TOTAL_WEIGHT) * 100).toFixed(2);
            resultDiv.innerHTML = `🎉 ВЫПАЛА ЦИФРА ${number} 🎉<br><span style="font-size:1rem;">(вероятность ${prob}%)</span>`;
        }

        // Анимация вращения
        function animateSpin(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            // кубический ease-out
            const easeOut = 1 - Math.pow(1 - t, 3);
            const newRotation = startRotation + (targetRotation - startRotation) * easeOut;
            currentRotation = newRotation % (2 * Math.PI);
            drawWheel();

            if (t < 1) {
                animFrame = requestAnimationFrame(animateSpin);
            } else {
                currentRotation = targetRotation % (2 * Math.PI);
                drawWheel();
                spinning = false;
                spinBtn.disabled = false;
                updateResultText();
                // небольшой эффект "всплытия"
                resultDiv.style.transform = "scale(1.02)";
                setTimeout(() => { resultDiv.style.transform = ""; }, 200);
            }
        }

        function startSpin() {
            if (spinning) return;
            spinning = true;
            spinBtn.disabled = true;
            startRotation = currentRotation;
            // случайное количество полных оборотов от 6 до 15
            const fullTurns = 6 + Math.floor(Math.random() * 10);
            // случайный дополнительный угол для непредсказуемости
            const randomDelta = Math.random() * 2 * Math.PI;
            const deltaAngle = fullTurns * 2 * Math.PI + randomDelta;
            targetRotation = startRotation + deltaAngle;
            startTime = performance.now();
            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(animateSpin);
        }

        // Адаптация размера canvas под контейнер
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, 600);
            canvas.width = size;
            canvas.height = size;
            drawWheel();
        }

        window.addEventListener('resize', () => resizeCanvas());
        resizeCanvas();

        spinBtn.addEventListener('click', startSpin);

        // Начальное отображение результата
        updateResultText();
    })();
</script>
</body>
</html>
